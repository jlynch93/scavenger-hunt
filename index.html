<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Scavenger Hunt Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-search"></i> Random Scavenger Hunt</h1>
            <p>Generate exciting scavenger hunts instantly!</p>
        </header>

        <main class="main-content">
            <section class="controls">
                <div class="control-group">
                    <label for="category">Category:</label>
                    <select id="category">
                        <option value="all">All Categories</option>
                        <option value="indoor">Indoor</option>
                        <option value="outdoor">Outdoor</option>
                        <option value="nature">Nature</option>
                        <option value="urban">Urban</option>
                        <option value="home">Home</option>
                        <option value="school">School</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="difficulty">Difficulty:</label>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="itemCount">Number of Items:</label>
                    <input type="number" id="itemCount" min="3" max="20" value="8">
                </div>

                <div class="control-group">
                    <label for="timeLimit">Time Limit (minutes):</label>
                    <input type="number" id="timeLimit" min="5" max="120" value="30">
                </div>

                <button id="generateBtn" class="generate-btn">
                    <i class="fas fa-dice"></i> Generate Hunt
                </button>
            </section>

            <section class="hunt-display" id="huntDisplay" style="display: none;">
                <div class="hunt-header">
                    <h2>Your Scavenger Hunt</h2>
                    <div class="hunt-info">
                        <span class="category-badge" id="categoryBadge"></span>
                        <span class="difficulty-badge" id="difficultyBadge"></span>
                        <span class="timer" id="timer"><i class="fas fa-clock"></i> <span id="timeRemaining">30:00</span></span>
                    </div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="items-list" id="itemsList"></div>

                <div class="hunt-actions">
                    <button id="startTimerBtn" class="action-btn start-btn">
                        <i class="fas fa-play"></i> Start Timer
                    </button>
                    <button id="pauseTimerBtn" class="action-btn pause-btn" style="display: none;">
                        <i class="fas fa-pause"></i> Pause
                    </button>
                    <button id="resetBtn" class="action-btn reset-btn">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                    <button id="newHuntBtn" class="action-btn new-hunt-btn">
                        <i class="fas fa-plus"></i> New Hunt
                    </button>
                </div>
            </section>

            <section class="stats" id="stats" style="display: none;">
                <h3>Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Completed: <span id="completedCount">0</span></span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-list"></i>
                        <span>Total: <span id="totalCount">0</span></span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-percentage"></i>
                        <span>Progress: <span id="progressPercent">0</span>%</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Created with <i class="fas fa-heart"></i> for adventure seekers!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
